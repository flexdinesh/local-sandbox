[supervisord]
nodaemon=false
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:tinyproxy]
command=/usr/bin/tinyproxy -d -c /etc/tinyproxy/tinyproxy.conf
autorestart=true
stdout_logfile=/var/log/tinyproxy/tinyproxy.stdout.log
stderr_logfile=/var/log/tinyproxy/tinyproxy.stderr.log
